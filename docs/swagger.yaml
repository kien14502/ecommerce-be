basePath: /api/1.0.0
definitions:
  dto.LoginRequest:
    properties:
      device_id:
        type: string
      password:
        minLength: 6
        type: string
      username:
        type: string
    required:
    - password
    - username
    type: object
  dto.LoginResponse:
    properties:
      access_token:
        type: string
      refresh_token:
        type: string
    type: object
  dto.PaginationResponse-array_dto_PostResponse:
    properties:
      items:
        items:
          $ref: '#/definitions/dto.PostResponse'
        type: array
      page:
        type: integer
      page_size:
        type: integer
      total:
        type: integer
      total_page:
        type: integer
    type: object
  dto.PostResponse:
    properties:
      content:
        type: string
      created_at:
        type: string
      id:
        type: string
      title:
        type: string
      updated_at:
        type: string
      user_id:
        type: string
    type: object
  dto.RegisterRequest:
    properties:
      email:
        type: string
      full_name:
        maxLength: 100
        minLength: 3
        type: string
      password:
        maxLength: 64
        minLength: 8
        type: string
      username:
        maxLength: 30
        minLength: 3
        type: string
    required:
    - email
    - full_name
    - password
    - username
    type: object
  dto.ResendVerifyOtpRequest:
    properties:
      email:
        type: string
    required:
    - email
    type: object
  dto.UserResponse:
    properties:
      avatar_url:
        type: string
      email:
        type: string
      full_name:
        type: string
      id:
        type: string
      username:
        type: string
    type: object
  dto.VerifyOtpRequest:
    properties:
      email:
        type: string
      otp:
        type: string
    required:
    - email
    - otp
    type: object
  response.Response:
    properties:
      code:
        type: string
      data: {}
      message:
        type: string
      success:
        type: boolean
    type: object
host: localhost:8000
info:
  contact:
    email: stylishjoker.epu@gmail.com
    name: Joker
    url: http://www.swagger.io/support
  description: This is a sample server celler server.
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  termsOfService: http://swagger.io/terms/
  title: Ecommerce API
  version: 1.0.0
paths:
  /auth/login:
    post:
      consumes:
      - application/json
      description: API dùng để xác đăng nhập tài khoản.
      parameters:
      - description: Thông tin đăng nhập
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Đăng nhập thành công
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  $ref: '#/definitions/dto.LoginResponse'
              type: object
        "400":
          description: Tài khoản hoặc mật khẩu không chính xác
          schema:
            $ref: '#/definitions/response.Response'
        "404":
          description: Không tìm thấy yêu cầu xác thực
          schema:
            $ref: '#/definitions/response.Response'
        "500":
          description: Lỗi hệ thống
          schema:
            $ref: '#/definitions/response.Response'
      summary: Đăng nhập tài khoản
      tags:
      - Auth
  /auth/logout:
    post:
      consumes:
      - application/json
      description: Logs out the current user by invalidating access token and removing
        refresh token cookie
      produces:
      - application/json
      responses:
        "200":
          description: Logout successful
          schema:
            $ref: '#/definitions/response.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.Response'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/response.Response'
      security:
      - BearerAuth: []
      summary: Logout user
      tags:
      - Auth
  /auth/me:
    get:
      consumes:
      - application/json
      description: Get the authenticated user's profile information
      produces:
      - application/json
      responses:
        "200":
          description: User profile retrieved successfully
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  $ref: '#/definitions/dto.UserResponse'
              type: object
        "401":
          description: Unauthorized - missing or invalid token
          schema:
            $ref: '#/definitions/response.Response'
        "408":
          description: Request timeout
          schema:
            $ref: '#/definitions/response.Response'
      security:
      - BearerAuth: []
      summary: Get current user profile
      tags:
      - Auth
  /auth/refresh-token:
    post:
      consumes:
      - application/json
      description: API dùng để lấy lại refresh token và access token mới từ refresh
        token trong cookie
      produces:
      - application/json
      responses:
        "200":
          description: Làm mới token thành công
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  $ref: '#/definitions/dto.LoginResponse'
              type: object
        "401":
          description: Refresh token không hợp lệ hoặc đã hết hạn
          schema:
            $ref: '#/definitions/response.Response'
        "500":
          description: Lỗi hệ thống
          schema:
            $ref: '#/definitions/response.Response'
      summary: Refresh Token
      tags:
      - Auth
  /auth/register:
    post:
      consumes:
      - application/json
      description: API cho phép người dùng đăng ký tài khoản bằng email và password.
      parameters:
      - description: Thông tin đăng ký
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.RegisterRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Đăng ký thành công
          schema:
            $ref: '#/definitions/response.Response'
        "400":
          description: Dữ liệu đầu vào không hợp lệ
          schema:
            $ref: '#/definitions/response.Response'
        "409":
          description: Email hoặc username đã tồn tại
          schema:
            $ref: '#/definitions/response.Response'
        "500":
          description: Lỗi hệ thống
          schema:
            $ref: '#/definitions/response.Response'
      summary: Đăng ký người dùng
      tags:
      - Auth
  /auth/resend-verify-email:
    post:
      consumes:
      - application/json
      description: Resend OTP verification email when the previous OTP has expired
      parameters:
      - description: Email to resend OTP
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.ResendVerifyOtpRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OTP resent successfully
          schema:
            $ref: '#/definitions/response.Response'
        "400":
          description: Email already verified or OTP still valid
          schema:
            $ref: '#/definitions/response.Response'
        "404":
          description: Email not found
          schema:
            $ref: '#/definitions/response.Response'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/response.Response'
      summary: Resend Verify Email
      tags:
      - Auth
  /auth/verify-otp:
    post:
      consumes:
      - application/json
      description: API dùng để xác thực OTP sau khi đăng ký tài khoản.
      parameters:
      - description: Thông tin xác thực OTP
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.VerifyOtpRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Xác thực OTP thành công
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  $ref: '#/definitions/dto.LoginResponse'
              type: object
        "400":
          description: OTP không hợp lệ hoặc dữ liệu sai
          schema:
            $ref: '#/definitions/response.Response'
        "404":
          description: Không tìm thấy yêu cầu xác thực
          schema:
            $ref: '#/definitions/response.Response'
        "500":
          description: Lỗi hệ thống
          schema:
            $ref: '#/definitions/response.Response'
      summary: Xác thực OTP
      tags:
      - Auth
  /user/{user_id}/posts:
    get:
      consumes:
      - application/json
      description: Retrieve a paginated list of posts by user ID
      parameters:
      - description: User ID
        in: path
        name: user_id
        required: true
        type: string
      - description: 'Page number (default: 1)'
        format: int64
        in: query
        name: page
        type: integer
      - description: 'Number of items per page (default: 10, max: 100)'
        format: int64
        in: query
        name: page_size
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Get posts successfully
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  $ref: '#/definitions/dto.PaginationResponse-array_dto_PostResponse'
              type: object
        "400":
          description: Invalid parameters
          schema:
            $ref: '#/definitions/response.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.Response'
        "404":
          description: User not found
          schema:
            $ref: '#/definitions/response.Response'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/response.Response'
      security:
      - BearerAuth: []
      summary: Get Posts By User ID
      tags:
      - Users
swagger: "2.0"
