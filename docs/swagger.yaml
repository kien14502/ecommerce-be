basePath: /api/1.0.0
definitions:
  dto.LoginRequest:
    properties:
      device_id:
        type: string
      password:
        minLength: 6
        type: string
      username:
        type: string
    required:
    - password
    - username
    type: object
  dto.LoginResponse:
    properties:
      access_token:
        type: string
      refresh_token:
        type: string
    type: object
  dto.RegisterRequest:
    properties:
      email:
        type: string
      full_name:
        maxLength: 100
        minLength: 3
        type: string
      password:
        maxLength: 64
        minLength: 8
        type: string
      username:
        maxLength: 30
        minLength: 3
        type: string
    required:
    - email
    - full_name
    - password
    - username
    type: object
  dto.VerifyOtpRequest:
    properties:
      email:
        type: string
      otp:
        type: string
    required:
    - email
    - otp
    type: object
  response.Response:
    properties:
      code:
        type: string
      data: {}
      message:
        type: string
      success:
        type: boolean
    type: object
host: localhost:8000
info:
  contact:
    email: stylishjoker.epu@gmail.com
    name: Joker
    url: http://www.swagger.io/support
  description: This is a sample server celler server.
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  termsOfService: http://swagger.io/terms/
  title: Ecommerce API
  version: 1.0.0
paths:
  /sse/events:
    get:
      consumes:
      - application/json
      description: Establishes an SSE connection to receive real-time events for a
        specific user
      parameters:
      - description: User ID (defaults to 'anonymous' if not provided)
        in: query
        name: user_id
        type: string
      produces:
      - text/event-stream
      responses:
        "200":
          description: 'SSE connection established. Events will be streamed in the
            format: id, event, data'
          headers:
            Cache-Control:
              description: no-cache
              type: string
            Connection:
              description: keep-alive
              type: string
            Content-Type:
              description: text/event-stream
              type: string
            Transfer-Encoding:
              description: chunked
              type: string
            X-Accel-Buffering:
              description: "no"
              type: string
          schema:
            type: object
      summary: Stream Server-Sent Events
      tags:
      - SSE
  /user/login:
    post:
      consumes:
      - application/json
      description: API dùng để xác đăng nhập tài khoản.
      parameters:
      - description: Thông tin đăng nhập
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Đăng nhập thành công
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  $ref: '#/definitions/dto.LoginResponse'
              type: object
        "400":
          description: Tài khoản hoặc mật khẩu không chính xác
          schema:
            $ref: '#/definitions/response.Response'
        "404":
          description: Không tìm thấy yêu cầu xác thực
          schema:
            $ref: '#/definitions/response.Response'
        "500":
          description: Lỗi hệ thống
          schema:
            $ref: '#/definitions/response.Response'
      summary: Đăng nhập tài khoản
      tags:
      - User
  /user/register:
    post:
      consumes:
      - application/json
      description: API cho phép người dùng đăng ký tài khoản bằng email và password.
      parameters:
      - description: Thông tin đăng ký
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.RegisterRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Đăng ký thành công
          schema:
            $ref: '#/definitions/response.Response'
        "400":
          description: Dữ liệu đầu vào không hợp lệ
          schema:
            $ref: '#/definitions/response.Response'
        "409":
          description: Email hoặc username đã tồn tại
          schema:
            $ref: '#/definitions/response.Response'
        "500":
          description: Lỗi hệ thống
          schema:
            $ref: '#/definitions/response.Response'
      summary: Đăng ký người dùng
      tags:
      - User
  /user/verify-otp:
    post:
      consumes:
      - application/json
      description: API dùng để xác thực OTP sau khi đăng ký tài khoản.
      parameters:
      - description: Thông tin xác thực OTP
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.VerifyOtpRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Xác thực OTP thành công
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  $ref: '#/definitions/dto.LoginResponse'
              type: object
        "400":
          description: OTP không hợp lệ hoặc dữ liệu sai
          schema:
            $ref: '#/definitions/response.Response'
        "404":
          description: Không tìm thấy yêu cầu xác thực
          schema:
            $ref: '#/definitions/response.Response'
        "500":
          description: Lỗi hệ thống
          schema:
            $ref: '#/definitions/response.Response'
      summary: Xác thực OTP
      tags:
      - User
  /users/{id}:
    get:
      consumes:
      - application/json
      description: Retrieve user details by ID
      parameters:
      - description: User ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: User information
          schema:
            properties:
              userID:
                type: string
            type: object
        "400":
          description: Bad request
          schema:
            properties:
              error:
                type: string
            type: object
        "404":
          description: User not found
          schema:
            properties:
              error:
                type: string
            type: object
      summary: Get user information
      tags:
      - Users
swagger: "2.0"
